<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Activity Tracker PRO</title>
    <link rel="stylesheet" href="./src/output.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");

      :root {
        --bg-dark: #030712;
        --card-dark: #111827;
        --border-dark: #1f2937;
        --accent-primary: #3b82f6;
        --accent-secondary: #22d3ee;
        --accent-tertiary: #6366f1;
      }

      body {
        background-color: var(--bg-dark);
        font-family: "Plus Jakarta Sans", sans-serif;
        color: #f3f4f6;
        min-height: 100vh;
        background-image:
          linear-gradient(var(--border-dark) 1px, transparent 1px),
          linear-gradient(90deg, var(--border-dark) 1px, transparent 1px);
        background-size: 50px 50px;
        background-position: center center;
      }

      .pro-card {
        background-color: var(--card-dark);
        border: 2px solid var(--border-dark);
        border-radius: 12px;
        box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.4);
        transition: all 0.3s ease;
      }

      @media (min-width: 768px) {
        .pro-card {
          box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
        }
      }

      .pro-card:hover {
        border-color: #374151;
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.6);
      }

      .pro-input:focus {
        border-color: var(--accent-secondary);
        box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
      }

      .btn-gradient {
        background: linear-gradient(
          135deg,
          var(--accent-primary) 0%,
          var(--accent-tertiary) 100%
        );
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-gradient:hover {
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        transform: translateY(-2px);
      }

      .loader {
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top: 2px solid #ffffff;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        animation: spin 0.8s linear infinite;
        display: none;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Animasi muncul untuk card baru */
      .fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="antialiased selection:bg-cyan-800 selection:text-cyan-100">
    <div
      class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 space-y-8 lg:space-y-12"
    >
      <div
        class="flex flex-col items-start gap-2 sm:gap-3 border-b border-gray-800 pb-6 sm:pb-8"
      >
        <div class="flex items-center gap-2">
          <span
            class="inline-block w-2 h-6 sm:w-3 sm:h-8 bg-gradient-to-b from-cyan-400 to-blue-600 rounded-sm"
          ></span>
          <h1
            class="text-[10px] sm:text-xs font-black uppercase tracking-[0.2em] sm:tracking-[0.3em] text-gray-500"
          >
            PERSONAL PRODUCTIVITY OS
          </h1>
        </div>
        <h2
          class="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-tighter text-white"
        >
          Jurnal Aktivitas
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600"
            >AI PRO</span
          >
        </h2>
        <p
          class="text-gray-400 text-sm sm:text-base md:text-lg max-w-2xl mt-1 font-medium leading-relaxed"
        >
          Log harian cerdas. Ketik kegiatanmu, biar AI yang menganalisis dan
          membuatkan ilustrasi visual untuk setiap aktivitas.
        </p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start relative">
        <div class="lg:col-span-4 lg:sticky lg:top-8 z-10">
          <div class="pro-card p-5 sm:p-7 bg-[#0a0f1d]">
            <div class="flex items-center gap-3 mb-4 sm:mb-5 text-gray-400">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 text-cyan-500"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 4v16m8-8H4"
                />
              </svg>
              <label
                for="activityInput"
                class="text-xs font-bold uppercase tracking-wider text-cyan-500"
              >
                TAMBAH LOG BARU
              </label>
            </div>

            <textarea
              id="activityInput"
              rows="4"
              class="pro-input pro-card w-full p-4 bg-[#030712] border border-gray-800 focus:border-cyan-500 rounded-lg outline-none transition-all duration-200 resize-none text-gray-100 placeholder:text-gray-600 mb-4 sm:mb-5 text-sm sm:text-base"
              placeholder="Contoh: Hari ini saya belajar React, lalu olahraga sore..."
            ></textarea>

            <button
              onclick="saveActivity()"
              class="w-full btn-gradient text-white px-6 py-3 sm:py-4 rounded-lg font-extrabold text-xs sm:text-sm uppercase tracking-widest flex items-center justify-center gap-3 group"
            >
              Simpan Aktivitas
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 group-hover:translate-x-1 transition-transform"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13 7l5 5m0 0l-5 5m5-5H6"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6" id="feedContainer"></div>
      </div>

      <footer
        class="text-center pt-8 border-t border-gray-800 text-gray-700 mt-12 pb-8"
      >
        <p class="text-[10px] sm:text-xs font-bold uppercase tracking-widest">
          &copy; 2026 AI Productivity Systems. Version 3.0.
        </p>
      </footer>
    </div>

    <script>
      // URL Backend kamu (Ganti dengan URL Vercel nanti)
      const BACKEND_URL = "https://back-end-cloud.vercel.app/api";

      // Gunakan Array untuk menyimpan banyak data
      let activityHistory = JSON.parse(
        localStorage.getItem("activity_history") || "[]",
      );

      window.onload = () => {
        renderFeed();
      };

      function saveActivity() {
        const input = document.getElementById("activityInput").value;
        if (!input.trim()) return alert("Masukkan aktivitas terlebih dahulu!");

        // Buat objek data baru
        const newEntry = {
          id: Date.now(), // Gunakan timestamp sebagai ID unik
          date: new Date().toLocaleString("id-ID", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          }),
          text: input,
          rec: null, // Tempat menyimpan hasil teks AI nanti
          img: null, // Tempat menyimpan hasil gambar AI nanti
        };

        // Masukkan ke urutan paling atas (awal array)
        activityHistory.unshift(newEntry);
        localStorage.setItem(
          "activity_history",
          JSON.stringify(activityHistory),
        );

        document.getElementById("activityInput").value = "";
        renderFeed();
      }

      // Fungsi untuk me-render ulang seluruh daftar riwayat
      function renderFeed() {
        const container = document.getElementById("feedContainer");

        if (activityHistory.length === 0) {
          container.innerHTML = `
            <div class="pro-card p-8 sm:p-12 text-center flex flex-col items-center border-dashed border-gray-700 bg-transparent">
               <div class="p-4 bg-gray-900 border border-gray-800 rounded-2xl text-gray-600 mb-4 sm:mb-6 shadow-inner">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 sm:h-12 sm:w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                  </svg>
               </div>
               <h4 class="text-lg sm:text-xl font-bold text-gray-500 mb-2">Belum Ada Log Aktivitas</h4>
               <p class="text-sm sm:text-base text-gray-600 max-w-xs">Simpan catatan pertama Anda di panel sebelah kiri.</p>
            </div>`;
          return;
        }
        console.log(activityHistory);
        container.innerHTML = activityHistory
          .map(
            (entry) => `
          <div class="pro-card p-5 sm:p-7 bg-[#0a0f1d] flex flex-col gap-4 sm:gap-5 fade-in-up">
            
            <div class="border-b border-gray-800 pb-4">
              <span class="text-[10px] sm:text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 block">
                ${entry.date}
              </span>
              <p class="text-gray-100 text-sm sm:text-base md:text-lg leading-relaxed font-medium">
                "${entry.text}"
              </p>
            </div>

            <div class="flex flex-col sm:flex-row gap-3">
              <button
                onclick="getRecommendation(${entry.id})"
                ${entry.rec ? "disabled" : ""}
                class="flex-1 flex items-center justify-center gap-2 sm:gap-3 bg-[#1f2937]/50 hover:bg-[#1f2937] border border-gray-700 hover:border-gray-600 text-white py-2.5 sm:py-3 rounded-lg transition-all duration-200 font-semibold text-[10px] sm:text-xs uppercase tracking-wider ${entry.rec ? "opacity-50 cursor-not-allowed" : "hover:text-cyan-300"}"
              >
                <span>✨</span> ${entry.rec ? "Dianalisis" : "Analisis AI"}
                <div id="recLoader-${entry.id}" class="loader"></div>
              </button>
              
              <button
                onclick="getImage(${entry.id})"
                ${entry.img ? "disabled" : ""}
                class="flex-1 flex items-center justify-center gap-2 sm:gap-3 bg-[#1f2937]/50 hover:bg-[#1f2937] border border-gray-700 hover:border-gray-600 text-white py-2.5 sm:py-3 rounded-lg transition-all duration-200 font-semibold text-[10px] sm:text-xs uppercase tracking-wider ${entry.img ? "opacity-50 cursor-not-allowed" : "hover:text-indigo-300"}"
              >
                <span>🎨</span> ${entry.img ? "Gambar Dibuat" : "Generate Gambar"}
                <div id="imgLoader-${entry.id}" class="loader"></div>
              </button>
            </div>

            <div class="flex flex-col gap-4 mt-2">
              
              ${
                entry.rec
                  ? `
                <div class="pro-card p-4 sm:p-5 bg-gradient-to-br from-cyan-900/20 to-transparent border-cyan-900/40">
                  <div class="mb-3">
                    <span class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest block mb-1">Saran Langkah</span>
                    <p class="text-gray-200 text-sm leading-relaxed">${entry.rec.rekomendasi}</p>
                  </div>
                  <div>
                    <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Konteks AI</span>
                    <p class="text-gray-400 text-xs sm:text-sm leading-relaxed">${entry.rec.tanggapan}</p>
                  </div>
                </div>
              `
                  : ""
              }

          ${
            entry.img
              ? `
  <div class="pro-card bg-[#030712] border-indigo-900/40 overflow-hidden relative group rounded-xl">
    <img 
      src="${entry.img}" 
      onerror="this.onerror=null; this.src='https://placehold.co/1024x1024/111827/3b82f6?text=Gambar+Gagal+Dimuat';"
      class="w-full h-auto object-cover transition-transform duration-700 hover:scale-105" 
      alt="AI Generated Visual" 
    />
    <div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/80 to-transparent text-left opacity-0 group-hover:opacity-100 transition-opacity">
        <p class="text-[10px] font-bold text-white uppercase tracking-wider">AI GENERATED IMAGE</p>
    </div>
  </div>
`
              : ""
          } 
              
            </div>
          </div>
        `,
          )
          .join("");
      }

      async function getRecommendation(id) {
        // Cari data berdasarkan ID
        const index = activityHistory.findIndex((a) => a.id === id);
        if (index === -1) return;
        const entry = activityHistory[index];

        const loader = document.getElementById(`recLoader-${id}`);
        loader.style.display = "inline-block";

        try {
          const res = await fetch(`${BACKEND_URL}/rekomendasi`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ activities: entry.text }),
          });

          const data = await res.json();

          if (res.ok) {
            // Simpan hasil dari server ke dalam array
            console.log(data);
            activityHistory[index].rec = {
              rekomendasi: data.rekomendasi,
              tanggapan: data.tanggapan,
            };
            // Simpan ke local storage agar tidak hilang
            localStorage.setItem(
              "activity_history",
              JSON.stringify(activityHistory),
            );
            // Render ulang untuk memunculkan hasilnya
            renderFeed();
          } else {
            alert("Error: " + data.error);
          }
        } catch (err) {
          alert("Gagal menghubungi server backend.");
        } finally {
          if (loader) loader.style.display = "none";
        }
      }

      async function getImage(id) {
        const index = activityHistory.findIndex((a) => a.id === id);
        if (index === -1) return;
        const entry = activityHistory[index];

        const loader = document.getElementById(`imgLoader-${id}`);
        loader.style.display = "inline-block";

        try {
          const res = await fetch(`${BACKEND_URL}/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ activities: entry.text }),
          });

          const data = await res.json();

          if (res.ok) {
            activityHistory[index].img = data.image;
            localStorage.setItem(
              "activity_history",
              JSON.stringify(activityHistory),
            );
            renderFeed();
          } else {
            alert("Error: " + data.error);
          }
        } catch (err) {
          alert("Gagal menghubungi server.");
        } finally {
          if (loader) loader.style.display = "none";
        }
      }
    </script>
  </body>
</html>
